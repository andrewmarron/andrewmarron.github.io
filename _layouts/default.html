<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Slate theme CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  </head>
  <body>

    <!-- REPLACED HEADER -->
    <header>
      <div style="
        width:100%;
        margin:0;
        padding:90px 0 60px 0;
        background: radial-gradient(circle at center, rgba(255,255,255,0.15) 0%, rgba(0,0,0,1) 80%);
        text-align:center;
        color:#fff;
        text-shadow:0 2px 4px rgba(0,0,0,0.6);
        border-bottom:6px solid #fff;
      ">
        <h1 style="font-size:4em; margin-bottom:0; letter-spacing:2px;">
          ANDREW MARRON
        </h1>
        <p style="font-size:1.4em; font-style:italic; opacity:0.9;">
          Writer · Performer · Storyteller
        </p>
      </div>
    </header>

    <section class="page-header">
      <!-- empty: we’re not using Slate’s default title block anymore -->
    </section>

    <section class="main-content">
      {{ content }}
    </section>

  </body>
</html>
