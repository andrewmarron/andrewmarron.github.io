<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Slate theme CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  </head>
  <body>

    <!-- REPLACED HEADER -->
<header>
  <div style="
    width:100%;
    height: auto
    margin:0;
    padding:90px 0 60px 0;
    background-image: url('/assets/img/website header.png');
    background-size: cover;
    background-position: center top;
    background-size: cover;
    background-repeat: no-repeat;
    height: 35vw;
    min-height: 400px;
    max-height: 600px;
    text-align:center;
    color:#fff;
    text-shadow:0 3px 6px rgba(0,0,0,0.7);
    border-bottom:6px solid #fff;
  ">
	<h1 style="
	  font-size:4em;
	  margin-bottom:0;
	  letter-spacing:2px;
	  font-weight:700;
	  color:#fdfdfd;
	  text-shadow:
	    0 0 12px rgba(255,255,255,0.45),   /* soft white glow */
	    0 3px 6px rgba(0,0,0,0.7);         /* dark drop shadow for contrast */
	">
	  ANDREW MARRON
	</h1>

    <p style="font-size:1.4em; font-style:italic; opacity:1;">
      Writer · Performer · Storyteller
    </p>
  </div>
</header>

    <section class="page-header">
      <!-- empty: we’re not using Slate’s default title block anymore -->
    </section>

    <section class="main-content">
      {{ content }}
    </section>

  </body>
</html>
