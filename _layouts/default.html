<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Slate theme CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  </head>
  <body>
<p style="color:red;">Layout loaded successfully</p>

    <!-- REPLACED HEADER -->
<header>
  <div style="
    max-width:100%;
    aspect-ratio: 3 / 2;
    background-image: url('/assets/img/website header.png');
    background-size: cover;
    background-position: center top;
    background-size: cover;
    background-repeat: no-repeat;
    text-align:center;
    color:#fff;
    text-shadow:0 3px 6px rgba(0,0,0,0.7);
    display:flex;
    flex-direction:column;
    justify-content:center;
    border-bottom:6px solid #fff;
  ">
	<h1 style="
 	  font-size: clamp(2.5rem, min(8vw, 20vh), 10rem);
 	  margin:0;
	  letter-spacing:2px;
	  font-weight:700;
	  color:#fdfdfd;
	  text-shadow:
	    0 0 12px rgba(255,255,255,0.45),   /* soft white glow */
	    0 3px 6px rgba(0,0,0,0.7);         /* dark drop shadow for contrast */
	">
	  ANDREW MARRON
	</h1>

    <p style="  
	font-size: clamp(1.5rem, min(4vw, 4vh), 2.5rem);
 	font-style:italic;
	color:#f5f5f5;
 	text-shadow:
   	0 0 8px rgba(255,255,255,0.35),
   	0 2px 4px rgba(0,0,0,0.6);
">
      Writer · Performer · Storyteller
    </p>
  </div>
</header>

    <section class="page-header">
      <!-- empty: we’re not using Slate’s default title block anymore -->
    </section>

    <section class="main-content">
      {{ content }}
    </section>

  </body>
</html>
